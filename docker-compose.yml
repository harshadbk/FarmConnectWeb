version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: ${MONGO_URI:-mongodb://host.docker.internal:27017/farmconnect}
      JWT_SECRET: ${JWT_SECRET:-secret_ecom_farmconnect_2024}
    volumes:
      - ./backend/upload:/app/upload
